name: Test
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22, latest]  # https://nodejs.org/en/about/previous-releases
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Install
        run: npm install
      - name: Test
        run: npm test
  test-msys2:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      MSYSTEM: UCRT64
      CHERE_INVOKING: 1
      MSYS2_PATH_TYPE: inherit
    strategy:
      matrix:
        node: [ 24 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: jq base-devel binutils git mingw-w64-ucrt-x86_64-toolchain
          pacboy: >-
            yarn:p
          update: true
          path-type: inherit
          release: false
      - name: Install
        run: npm install
      - name: Test
        run: npm test
